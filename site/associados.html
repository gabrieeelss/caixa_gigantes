<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Associados</title>

</head>

<body class="bg-light">

    <div class="container mt-4">

        <h2 class="mb-4">Associados</h2>


        <!-- FORMULÁRIO -->
        <form action="#" id="form-cad-associado">

            <div class="card mb-4">

                <div class="card-header">
                    Adicionar Associado
                </div>

                <div class="card-body">
                    <div class="row g-2">
                        <div class="col-md-2">
                            <input type="date" id="data_nascimento" class="form-control">
                        </div>

                        <div class="col-md-3">
                            <input type="text" id="nome_associado" class="form-control" placeholder="Nome">
                        </div>

                        <div class="col-md-4">
                            <input type="email" id="email_associado" class="form-control" placeholder="E-mail">
                        </div>

                        <div class="col-md-2">
                            <input type="number" id="telefone_associado" class="form-control" placeholder="Telefone">
                        </div>

                        <div class="col-md-2">
                            <input type="text" id="cpf_associado" class="form-control" placeholder="CPF">
                        </div>

                        <div class="col-md-2">
                            <input type="text" id="rg_associado" class="form-control" placeholder="RG e Orgão Emissor">
                        </div>

                        <div class="col-md-4">
                            <input type="text" id="endereco_associado" class="form-control"
                                placeholder="Endereço Completo">
                        </div>


                        <div class="col-md-1 d-grid">
                            <button id="btn-add-associado" class="btn btn-primary">
                                +
                            </button>
                        </div>
                    </div>

                </div>
            </div>
        </form>
        <!-- TABELA -->

        <div class="card">
            <div class="card-header">
                Associados
            </div>
            <div class="card-body">
                <table class="table table-striped table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Data de Associação</th>
                            <th>Nome</th>
                            <th>E-mail</th>
                            <th>Telefone</th>
                            <th>RG</th>
                            <th>CPF</th>
                            <th>Data Nascimento</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela_associados"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="app_associados.js"></script>
    <script src="app_exibir_associados.js"></script>
    <script src="app_excluir_associado.js"></script>

</body>

</html>
