<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Associado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="#">Caixa Gigantes</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="associados.html">Associados</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="cad_associado.html">Cadastrar</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="caixa.html">Caixa</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="mensalidades.html">Mensalidades</a>
                </li>
            </ul>
            <div class="d-flex">
                <button class="btn btn-danger btn-sm" onclick="logout()">Sair</button>
            </div>
        </div>
    </div>
</nav>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Cadastrar Novo Associado</h2>
            <a href="associados.html" class="btn btn-secondary">Voltar</a>
        </div>

        <div class="card shadow-sm">
            <div class="card-header">
                Dados do Associado
            </div>

            <div class="card-body">
                <form id="form-cad-associado">
                    <div class="row g-3">

                        <div class="col-md-3">
                            <label for="data_associacao" class="form-label">Data de Associação</label>
                            <input type="date" id="data_associacao" class="form-control">
                        </div>

                        <div class="col-md-3">
                            <label for="data_nascimento" class="form-label">Data de Nascimento</label>
                            <input type="date" id="data_nascimento" class="form-control">
                        </div>

                        <div class="col-md-6">
                            <label for="nome_associado" class="form-label">Nome</label>
                            <input type="text" id="nome_associado" class="form-control" placeholder="Nome completo">
                        </div>

                        <div class="col-md-6">
                            <label for="email_associado" class="form-label">E-mail</label>
                            <input type="email" id="email_associado" class="form-control" placeholder="E-mail">
                        </div>

                        <div class="col-md-3">
                            <label for="telefone_associado" class="form-label">Telefone</label>
                            <input type="text" id="telefone_associado" class="form-control" placeholder="Telefone">
                        </div>

                        <div class="col-md-3">
                            <label for="status_associado" class="form-label">Status</label>
                            <select id="status_associado" class="form-select">
                                <option value="ativo" selected>Ativo</option>
                                <option value="inativo">Inativo</option>
                            </select>
                        </div>

                        <div class="col-md-3">
                            <label for="cpf_associado" class="form-label">CPF</label>
                            <input type="text" id="cpf_associado" class="form-control" placeholder="CPF">
                        </div>

                        <div class="col-md-3">
                            <label for="rg_associado" class="form-label">RG</label>
                            <input type="text" id="rg_associado" class="form-control" placeholder="RG e órgão emissor">
                        </div>

                        <div class="col-md-12">
                            <label for="endereco_associado" class="form-label">Endereço Completo</label>
                            <input type="text" id="endereco_associado" class="form-control" placeholder="Endereço completo">
                        </div>

                        <div class="col-12 d-flex gap-2">
                            <button type="submit" class="btn btn-primary">Cadastrar Associado</button>
                            <button type="reset" class="btn btn-outline-secondary">Limpar</button>
                        </div>

                    </div>
                </form>

                <div id="mensagem" class="mt-3"></div>
            </div>
        </div>
    </div>

    <script src="./app/app_cad_associado.js"></script>
    <script src="./app/app_logout.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
