<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastrar Usuário</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#">Caixa Gigantes</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="caixa.html">Caixa</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="mensalidades.html">Mensalidades</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="associados.html">Associados</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="cad_associado.html">Cad. Associado</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="usuarios.html">Usuários</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="cad_usuario.html">Cad. Usuário</a>
                    </li>
                </ul>
                <div class="d-flex">
                    <button class="btn btn-danger btn-sm" onclick="logout()">Sair</button>
                </div>
            </div>
        </div>
    </nav>

  <div class="container py-4">
    <div class="row justify-content-center">
      <div class="col-lg-6">
        <div class="card shadow-sm">
          <div class="card-header bg-primary text-white">
            Cadastro de Usuário
          </div>

          <div class="card-body">
            <form id="form-cad-usuario">
              <div class="mb-3">
                <label for="login" class="form-label">Login</label>
                <input type="text" id="login" class="form-control" required>
              </div>

              <div class="mb-3">
                <label for="senha" class="form-label">Senha</label>
                <input type="password" id="senha" class="form-control" required>
              </div>

              <div class="mb-3">
                <label for="nivel" class="form-label">Nível de acesso</label>
                <select id="nivel" class="form-select" required>
                  <option value="">Selecione</option>
                  <option value="admin">Admin</option>
                  <option value="operador">Operador</option>
                </select>
              </div>

              <div class="d-grid">
                <button type="button" class="btn btn-primary" id="btn-cadastrar-usuario">
                  Cadastrar Usuário
                </button>
              </div>
            </form>

            <div id="mensagem" class="mt-3 text-center"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="app/app_cad_usuario.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
