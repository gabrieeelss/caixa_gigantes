<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<title>Fluxo de Caixa</title>

</head>

<body class="bg-light">

<div class="container mt-4">

<h2 class="mb-4">Fluxo de Caixa</h2>

<!-- SALDO -->

<div class="card mb-4">
<div class="card-body">

<h4>
Saldo Atual: 
<span class="text-success">R$ <span id="saldo">0.00</span></span>
</h4>

</div>
</div>

<!-- FORMULÁRIO -->

<div class="card mb-4">

<div class="card-header">
Adicionar Receita / Despesa
</div>

<div class="card-body">

<div class="row g-2">

<div class="col-md-2">
<input type="date" id="data" class="form-control">
</div>

<div class="col-md-3">
<select id="categoria" class="form-select">

<option value="1">Mensalidade</option>
<option value="2">Multa</option>
<option value="3">Prestação de serviço</option>
<option value="4">Doação</option>
<option value="5">Despesa</option>
<option value="6">Pagamento serviço</option>

</select>
</div>

<div class="col-md-3">

<select id="associado" class="form-select">

<option value="">Selecione Associado</option>

</select>

</div>

<div class="col-md-3">

<input type="text"
id="nome_manual"
class="form-control"
placeholder="Nome manual (opcional)">

</div>

<div class="col-md-4">
<input type="text" id="descricao" class="form-control" placeholder="Descrição">
</div>

<div class="col-md-2">
<input type="number" id="valor" class="form-control" placeholder="Valor">
</div>

<div class="col-md-1 d-grid">
<button id="btnAdicionar" class="btn btn-primary">
+
</button>
</div>

</div>

</div>
</div>

<!-- TABELA -->

<div class="card">

<div class="card-header">
Movimentações
</div>

<div class="card-body">

<table class="table table-striped table-hover">

<thead class="table-dark">
<tr>
<th>Data</th>
<th>Descrição</th>
<th>Categoria</th>
<th>Tipo</th>
<th>Origem</th>
<th>Valor</th>
</tr>
</thead>

<tbody id="tabelaCaixa"></tbody>

</table>

</div>

</div>

</div>

<script src="app_caixa.js"></script>

</body>
</html>
