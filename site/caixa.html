<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Fluxo de Caixa</title>

</head>

<body class="bg-light">

<!-- HEADER -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#">Caixa Gigantes</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="caixa.html">Caixa</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="mensalidades.html">Mensalidades</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="associados.html">Associados</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="cad_associado.html">Cad. Associado</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="usuarios.html">Usuários</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="cad_usuario.html">Cad. Usuário</a>
                    </li>
                </ul>
                <div class="d-flex">
                    <button class="btn btn-danger btn-sm" onclick="logout()">Sair</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-4">

        <h2 class="mb-4">Fluxo de Caixa</h2>

        <!-- SALDO -->

        <div class="card mb-4 shadow-sm">
            <div class="card-body">
                <h4 class="mb-0">
                    Saldo Atual:
                    R$ <span id="saldo">0,00</span>
                </h4>
            </div>
        </div>

        <!-- FORMULÁRIO DE RECEITAS E DESPESAS -->
        <form action="#" id="form-fluxo-caixa">
            <div class="card mb-4">

                <div class="card-header">
                    <h5>Adicionar Receita / Despesa</h5>
                </div>

                <div class="card-body">
                    <div class="row g-2">
                        <div class="col-md-2">
                            <select id="tipo" class="form-select">
                                <option value="1">Entrada</option>
                                <option value="2">Saída</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <input type="date" id="data_movimento" class="form-control">
                        </div>
                        <div class="col-md-3">
                            <select id="categoria_id" class="form-select">
                                <option value="">Selecione Categoria</option>
                            </select>
                        </div>

                        <div class="col-md-3">
                            <select id="associado_id_caixa" class="form-select">
                                <option value="">Selecione Associado</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <input type="text" id="nome_manual" class="form-control"
                                placeholder="Nome Manual (Opcional)">
                        </div>
                        <div class="col-md-4">
                            <input type="text" id="descricao" class="form-control" placeholder="Descrição">
                        </div>
                        <div class="col-md-2">
                            <input type="number" id="valor_mov" class="form-control" placeholder="Valor">
                        </div>
                        <div class="col-md-1 d-grid">
                            <button id="btn-add-mov" class="btn btn-primary">
                                +
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </form>
        <!-- TABELA -->

        <div class="card shadow-sm">
            <div class="card-header">
                Movimentações
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>Tipo</th>
                                <th>Data</th>
                                <th>Associado / Nome</th>
                                <th>Categoria</th>
                                <th>Descrição</th>
                                <th>Valor</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaCaixa"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="./app/app_caixa.js"></script>
    <script src="./app/app_saldo.js"></script>
    <script src="./app/app_lista_caixa.js"></script>
    <script src="./app/app_excluir_mov.js"></script>
    <script src="./app/app_logout.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
