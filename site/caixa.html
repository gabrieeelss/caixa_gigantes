<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Fluxo de Caixa</title>

</head>

<body class="bg-light">

    <div class="container mt-4">

        <h2 class="mb-4">Fluxo de Caixa</h2>

        <!-- SALDO -->

        <div class="card mb-4">
            <div class="card-body">

                <h4>
                    Saldo Atual:
                    <span class="text-success">R$ <span id="saldo">0.00</span></span>
                </h4>

            </div>
        </div>

        <!-- FORMULÁRIO -->
        <form action="#" id="form-fluxo-caixa">
            <div class="card mb-4">

                <div class="card-header">
                    Adicionar Receita / Despesa
                </div>

                <div class="card-body">
                    <div class="row g-2">
                        <div class="col-md-2">
                            <select id="tipo" class="form-select">
                                <option value="1">Entrada</option>
                                <option value="2">Saída</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <input type="date" id="data_movimento" class="form-control">
                        </div>
                        <div class="col-md-3">
                            <input type="text" id="categoria" class="form-control"
                                placeholder="Ex: Mensalidade, pagamento...">
                        </div>
                        <div class="col-md-3">
                            <select id="associado_id" class="form-select">
                                <option value="">Selecione Associado</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <input type="text" id="nome_manual" class="form-control"
                                placeholder="Nome Manual (Opcional)">
                        </div>
                        <div class="col-md-4">
                            <input type="text" id="descricao" class="form-control" placeholder="Descrição">
                        </div>
                        <div class="col-md-2">
                            <input type="number" id="valor" class="form-control" placeholder="Valor">
                        </div>
                        <div class="col-md-1 d-grid">
                            <button id="btn-add-mov" class="btn btn-primary">
                                +
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </form>
        <!-- TABELA -->

        <div class="card">

            <div class="card-header">
                Movimentações
            </div>
            <div class="card-body">
                <table class="table table-striped table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>Tipo</th>
                            <th>Data</th>
                            <th>Associado</th>
                            <th>Categoria</th>
                            <th>Descrição</th>
                            <th>Valor</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaCaixa"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="app_caixa.js"></script>

</body>

</html>
