<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Movimentação</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header">
                        <h3 class="mb-0">Editar Movimentação</h3>
                    </div>

                    <div class="card-body">
                        <form id="formEditarMovimentacao">
                            <input type="hidden" id="id_movimentacao">

                            <div class="mb-3">
                                <label for="data_movimento" class="form-label">Data</label>
                                <input type="date" class="form-control" id="data_movimento" required>
                            </div>

                            <div class="mb-3">
                                <label for="associado_id" class="form-label">Associado</label>
                                <select class="form-select" id="associado_id">
                                    <option value="">Selecione um associado</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="nome_manual" class="form-label">Nome manual</label>
                                <input type="text" class="form-control" id="nome_manual">
                            </div>

                            <div class="mb-3">
                                <label for="categoria_id" class="form-label">Categoria</label>
                                <select class="form-select" id="categoria_id" required>
                                    <option value="">Selecione uma categoria</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="descricao" class="form-label">Descrição</label>
                                <input type="text" class="form-control" id="descricao" required>
                            </div>

                            <div class="mb-3">
                                <label for="valor" class="form-label">Valor</label>
                                <input type="number" step="0.01" class="form-control" id="valor" required>
                            </div>

                            <div class="d-flex gap-2">
                                <a href="caixa.html" class="btn btn-secondary">Cancelar</a>
                                <button type="submit" class="btn btn-primary">Salvar alterações</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="./app/app_editar_mov.js"></script>
</body>
</html>
