<!-- CONTEÚDO -->
<div class="container py-4">

  <h3 class="mb-4">Controle de Mensalidades</h3>

  <div class="row g-4">

    <!-- FORM -->
    <div class="col-lg-4">
      <div class="card">
        <div class="card-header bg-primary text-white">
          Cadastro de Mensalidade
        </div>

        <div class="card-body">

          <form id="form-mensalidades">

            <div class="mb-3">
              <label class="form-label">Associado</label>
              <select id="associado_id_mensalidade" class="form-select" required></select>
            </div>

            <div class="row">
              <div class="col-6 mb-3">
                <label class="form-label">Mês</label>
                <select id="mes" class="form-select" required>
                  <option value="">Selecione</option>
                  <option value="1">Jan</option>
                  <option value="2">Fev</option>
                  <option value="3">Mar</option>
                  <option value="4">Abr</option>
                  <option value="5">Mai</option>
                  <option value="6">Jun</option>
                  <option value="7">Jul</option>
                  <option value="8">Ago</option>
                  <option value="9">Set</option>
                  <option value="10">Out</option>
                  <option value="11">Nov</option>
                  <option value="12">Dez</option>
                </select>
              </div>

              <div class="col-6 mb-3">
                <label class="form-label">Ano</label>
                <input type="number" id="ano" class="form-control" required>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Valor</label>
              <input type="number" id="valor_mensalidade" class="form-control" step="0.01" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Data Pagamento</label>
              <input type="date" id="data_pagamento" class="form-control">
            </div>

            <div class="mb-3">
              <label class="form-label">Status</label>
              <select id="status" class="form-select" required>
                <option value="pago">Pago</option>
                <option value="pendente">Pendente</option>
              </select>
            </div>

            <button id="btn-add-mensalidade" type="button" class="btn btn-primary w-100">
              Salvar
            </button>

          </form>

        </div>
      </div>
    </div>

    <!-- TABELA -->
    <div class="col-lg-8">
      <div class="card">
        <div class="card-header bg-primary text-white">
          Lista de Mensalidades
        </div>

        <div class="card-body">

          <div class="table-responsive">
            <table class="table table-striped table-hover align-middle">

              <thead class="table-light">
                <tr>
                  <th>ID</th>
                  <th>Associado</th>
                  <th>Mês/Ano</th>
                  <th>Valor</th>
                  <th>Data</th>
                  <th>Status</th>
                </tr>
              </thead>

              <tbody id="tbody_mensalidades">
                <tr>
                  <td colspan="6" class="text-center">
                    Nenhuma mensalidade carregada
                  </td>
                </tr>
              </tbody>

            </table>
          </div>

        </div>
      </div>
    </div>

  </div>
</div>

<script src="app/app_mensalidades.js"></script>
<script src="app/app_lista_mensalidades.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
